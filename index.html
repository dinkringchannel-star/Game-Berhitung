<script>

// ===== VAR =====
let angka1, angka2, angka3, hasil;
let benar = 0;
let soalKe = 0;
let totalSoal = 10;
let musikAktif = false;

// ===== SUARA LUCU =====
function ngomong(teksArray){
    let teks = teksArray[Math.floor(Math.random()*teksArray.length)];
    let u = new SpeechSynthesisUtterance(teks);
    u.lang = "id-ID";
    u.pitch = 1.8;
    u.rate = 1.1;
    speechSynthesis.speak(u);
}

// ===== SOUND EFFECT =====
function bunyiKlik(){
    let ctx = new (window.AudioContext || window.webkitAudioContext)();
    let o = ctx.createOscillator();
    o.type = "square";
    o.frequency.setValueAtTime(600, ctx.currentTime);
    o.connect(ctx.destination);
    o.start();
    o.stop(ctx.currentTime + 0.1);
}

function bunyiBenar(){
    let ctx = new (window.AudioContext || window.webkitAudioContext)();
    let o = ctx.createOscillator();
    o.type = "sine";
    o.frequency.setValueAtTime(800, ctx.currentTime);
    o.frequency.linearRampToValueAtTime(1200, ctx.currentTime + 0.2);
    o.connect(ctx.destination);
    o.start();
    o.stop(ctx.currentTime + 0.2);
}

function bunyiSalah(){
    let ctx = new (window.AudioContext || window.webkitAudioContext)();
    let o = ctx.createOscillator();
    o.type = "sawtooth";
    o.frequency.setValueAtTime(200, ctx.currentTime);
    o.connect(ctx.destination);
    o.start();
    o.stop(ctx.currentTime + 0.3);
}

function bunyiSelesai(){
    let ctx = new (window.AudioContext || window.webkitAudioContext)();
    let o = ctx.createOscillator();
    o.type = "triangle";
    o.frequency.setValueAtTime(500, ctx.currentTime);
    o.frequency.linearRampToValueAtTime(1000, ctx.currentTime + 0.5);
    o.connect(ctx.destination);
    o.start();
    o.stop(ctx.currentTime + 0.5);
}

// ===== MUSIK =====
function toggleMusik(){
    let bgm = document.getElementById("bgm");

    if(musikAktif){
        bgm.pause();
        musikAktif = false;
    }else{
        bgm.play();
        musikAktif = true;
    }
}

document.body.addEventListener("click", function(){
    if(!musikAktif){
        document.getElementById("bgm").play();
        musikAktif = true;
    }
}, {once:true});

// ===== SOAL =====
function buatSoal(){
    totalSoal = parseInt(document.getElementById("jumlahSoal").value);

    angka1 = Math.floor(Math.random()*10)+1;
    angka2 = Math.floor(Math.random()*10)+1;
    hasil = angka1 * angka2;

    soalKe++;

    document.getElementById("soal").innerText = angka1+" x "+angka2+" = ?";
    document.getElementById("soalKe").innerText = soalKe;
    document.getElementById("jawaban").value = "";
    document.getElementById("jawaban").focus();
}

// ===== CEK =====
function cekJawaban(){
    let jawab = document.getElementById("jawaban").value;

    if(jawab == hasil){
        benar++;

        document.getElementById("notif").innerText = "? Benar";

        bunyiBenar();
        ngomong(["Yeaaay! Lanjutkan","Hebat!","Keren! kamu","Mantap!"]);

    }else{
        document.getElementById("notif").innerText = "? Salah ("+hasil+")";

        bunyiSalah();
        ngomong(["Yahh salah!","Coba lagi!","Semangat!"]);
    }

    document.getElementById("benar").innerText = benar;

    if(soalKe >= totalSoal){
        setTimeout(selesai,700);
    }else{
        setTimeout(buatSoal,500);
    }
}

// ===== SELESAI =====
function selesai(){

    bunyiSelesai();
    ngomong(["Horeee!","Kamu hebat!","Selamat!"]);
	
    let nama = document.getElementById("nama").value || "Peserta";
    let nilai = Math.round((benar / totalSoal) * 100);

    // kirim data lewat URL

    window.location.href = 
        "sertifikat.html?nama=" + encodeURIComponent(nama) +
        "&nilai=" + nilai;

}


// ===== ENTER =====
document.getElementById("jawaban").addEventListener("keydown", function(e){
    if(e.key === "Enter") cekJawaban();
});

// ===== START =====
buatSoal();
</script>
