<!DOCTYPE html>
<html lang="id">
<head>

<style>
body {

}

#sertifikat {

    width: 1122px;

.bg {
    position: absolute;

    background-size: cover;
}

/* layer teks */
.layer {
    position: absolute;
    width: 100%;
    height: 100%;
}

/* NAMA */
.nama {
    position: absolute; color:#333399;
    top: 530px;
	left:15px;
    width: 100%;
	text-align: Left;
    font-size: 36px;
    font-weight: bold; 
	font-style: italic;
}

/* NILAI */
.nilai {
    position: absolute;
    top: 585px;
	left:125px;
    width: 100%;
    text-align: left;
    font-size: 40px;
    color: darkblue;
}

/* TANGGAL */

    position: absolute;
	left:15px;

	font-weight: bold;

</head>

<script>

// ambil parameter dari URL
const params = new URLSearchParams(window.location.search);

const nama = params.get("nama") || "Peserta";
const nilai = params.get("nilai") || "0";

// masukkan ke tampilan
document.getElementById("nama").innerText = nama;
document.getElementById("nilai").innerText = nilai;

// tanggal otomatis
let today = new Date().toLocaleDateString("id-ID", {
    day: 'numeric',
    month: 'long',
    year: 'numeric'
});
document.getElementById("tanggal").innerText = today;


// contoh
isiData("Budi Santoso", 95);

function downloadPDF(){
    const element = document.getElementById("sertifikat");

    html2pdf().set({
        margin: 0,
        filename: 'sertifikat.pdf',
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'px', format: [1122, 794], orientation: 'landscape' }
    }).from(element).save();
}


</script>

</body>
</html>
